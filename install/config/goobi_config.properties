# -----------------------------------
# Goobi workflow - basic configuration
# -----------------------------------
#
# This file contains the most common configuration properties.
# Values defined here override the application defaults and can be used
# to configure a Goobi workflow instance without modifying the bundled defaults.
#
# ------------------------------------------------------------------------------------
# IMPORTANT: If you're hosting goobi workflow via docker all properties can be set as
# environment variables using the schema 'GOOBI_<property_name>'. These are stored in
# the bundled properties file, not in this file!
# ------------------------------------------------------------------------------------
#
# For a full list of all available properties and their documentation, see:
# https://docs.goobi.io/en/workflow/manual/admin/config_files/goobi_config.properties
#
# -----------------------------------
# application information
# -----------------------------------

# The URL of the general Goobi web page shown on the login screen.
#ApplicationTitle=http://goobi.io

# The name of the software displayed on the Goobi workflow login page.
#ApplicationHeaderTitle=Goobi workflow

# URL of an associated home page for this Goobi workflow instance.
#ApplicationHomepageMsg=info

# URL of an associated website for this Goobi workflow instance.
#ApplicationWebsiteMsg=info

# -----------------------------------
# user settings
# -----------------------------------

# Minimum password length for user accounts. Must be at least 1.
#minimumPasswordLength=8

# Set to true to hide other users' names in statistics and process/step details.
#anonymize=false

# -----------------------------------
# ldap
# -----------------------------------

# Set to true to enable LDAP authentication.
#ldap_use=false

# -----------------------------------
# web api
# -----------------------------------

# Set to true to enable Goobi workflow's internal REST API.
# If disabled, any REST request returns a 404 error.
#useWebApi=false

# -----------------------------------
# geonames
# -----------------------------------

# Username for the GeoNames web service (https://www.geonames.org).
# Required when metadata fields use DisplayType=geonames in the METS editor.
#geonames_account=

# -----------------------------------
# security
# -----------------------------------

# Secret used to sign and verify JSON Web Tokens for REST API authentication.
# Change this to a secure random value before going to production.
#jwtSecret=CHANGEME