<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:composite="http://xmlns.jcp.org/jsf/composite"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
	xmlns:util="http://goobi.io/util">

	<composite:interface>
		<composite:attribute name="icon" default="undefined" />
		<composite:attribute name="tablerIcon" default="undefined" />
		<composite:attribute name="tablerIconClass" default="icon--lg icon--b4" />
		<composite:attribute name="title" />
	</composite:interface>

	<composite:implementation>

		<div class="box__title">
			<h2>
				<!-- FA icon (legacy) -->
				<span aria-hidden="true" class="fa #{cc.attrs.icon} "
					jsf:rendered="#{cc.attrs.icon != 'undefined' and cc.attrs.tablerIcon == 'undefined'}" />
				<!-- Tabler icon -->
				<util:icon icon="#{cc.attrs.tablerIcon}" styleClass="#{cc.attrs.tablerIconClass}"
					rendered="#{cc.attrs.tablerIcon != 'undefined'}" />
				<h:outputText value="#{cc.attrs.title}" />
			</h2>
			<composite:insertChildren />
		</div>

	</composite:implementation>
</ui:composition>
