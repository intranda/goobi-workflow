<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:util="http://goobi.io/util">

    <composite:interface>
        <composite:attribute name="content" />
        <composite:attribute name="labelRequired" default="false" />
        <composite:attribute name="label" />
        <composite:attribute name="labelFor" />
    </composite:interface>

    <composite:implementation>

		<ui:fragment rendered="#{!cc.attrs.labelRequired}">
			<label for="#{component.namingContainer.parent.namingContainer.clientId}:#{cc.attrs.labelFor}" class="form__label">
				#{cc.attrs.label}
			</label>
		</ui:fragment>

		<ui:fragment rendered="#{cc.attrs.labelRequired}">
			<label
				for="#{component.namingContainer.parent.namingContainer.clientId}:#{cc.attrs.labelFor}"
				class="form__label">
				#{cc.attrs.label}
                <util:icon icon="asterisk" styleClass="ms-2 text-primary icon--xs icon--b5 align-text-top" title="#{msgs.requiredField}" />
			</label>
		</ui:fragment>
		<composite:insertChildren />
    </composite:implementation>

</ui:composition>
