<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html">

    <composite:interface>
        <composite:attribute name="modalId" required="true" />
        <composite:attribute name="iconName" required="true" />
        <composite:attribute name="iconClass" required="true" />
    </composite:interface>

    <composite:implementation>
        <div class="modal fade" id="#{cc.attrs.modalId}" tabindex="-1" role="dialog" aria-labelledby="#{cc.attrs.modalId}-label">
            <div class="modal-dialog modal-dialog-centered" role="document">
                <div class="modal-content">
                    <div class="modal-header bg-primary text-white">
                        <h4 class="modal-title" id="#{cc.attrs.modalId}-label">
                            <span class="#{cc.attrs.iconClass} me-2" /> #{cc.attrs.iconName}
                        </h4>
                        <button type="button" class="btn text-white" data-bs-dismiss="modal">
                            <span class="fa fa-times" />
                        </button>
                    </div>
                    <div class="modal-body p-0">
                        <div class="list-group list-group-flush">
                            <composite:insertChildren />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-blank" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </composite:implementation>
</ui:composition>
