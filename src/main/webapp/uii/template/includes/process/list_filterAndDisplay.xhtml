<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:c="http://java.sun.com/jsp/jstl/core"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    xmlns:util="http://goobi.io/util">

    <composite:interface>
    </composite:interface>

    <composite:implementation>

        <div
            class="btn-group table-compact-sort"
            data-bs-toggle="tooltip"
            title="#{msgs.defaultSortField}">
            <div id="sortDropdown" class="dropdown">
                <button
                    type="button"
                    class="btn btn-neutral-200 text-black dropdown-toggle"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                    aria-label="#{msgs.defaultSortField}">
                    <util:icon icon="arrows-sort" />
                </button>
                <ul class="dropdown-menu">
                    <!-- ID -->
                    <li>
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.id}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'prozesse.ProzesseID asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'prozesse.ProzesseID desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'prozesse.ProzesseID asc' ? 'prozesse.ProzesseID desc' : 'prozesse.ProzesseID asc'}" />
                        </button>
                    </li>
                    <!-- Batch -->
                    <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.batch}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'prozesse.batchID asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'prozesse.batchID desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'prozesse.batchID asc' ? 'prozesse.batchID desc' : 'prozesse.batchID asc'}" />
                        </button>
                    </li>
                    <!-- Title -->
                    <li>
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{ProzessverwaltungForm.modusAnzeige=='aktuell'?msgs.prozessTitel:msgs.titel}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'prozesse.titel asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'prozesse.titel desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'prozesse.titel asc' ? 'prozesse.titel desc' : 'prozesse.titel asc'}" />
                        </button>
                    </li>
                    <!-- Custom Table Columns -->
                    <c:forEach
                        items="#{LoginForm.listOfCustomColumns}"
                        var="var"
                        rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                        <li jsf:rendered="#{LoginForm.isDisplaySortfield(var)}">
                            <button
                                jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                                class="dropdown-item d-flex justify-content-between">
                                <h:outputText value="#{msgs[fn:substring(var, fn:indexOf(var,'.') lt 0 ? 1 : fn:indexOf(var,'.') + 1, var.length() - fn.indexOf(var,'.') - 1)]}" />
                                <util:icon icon="#{ProzessverwaltungForm.sortField == fn:join(fn:split(var, ' '), ' ') += ' asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == fn:join(fn:split(var, ' '), ' ') += ' desc' ? 'sort-descending' : 'arrows-sort'}" />
                                <f:setPropertyActionListener
                                    target="#{ProzessverwaltungForm.sortField}"
                                    value="#{ProzessverwaltungForm.sortField == fn:join(fn:split(var, ' '), ' ') += ' asc' ? fn:join(fn:split(var, ' '), ' ') += ' desc' : fn:join(fn:split(var, ' '), ' ') += ' asc'}" />
                            </button>
                        </li>
                    </c:forEach>
                    <!-- Creation Date -->
                    <li>
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.vorgangsdatum}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'prozesse.erstellungsdatum asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'prozesse.erstellungsdatum desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'prozesse.erstellungsdatum asc' ? 'prozesse.erstellungsdatum desc' : 'prozesse.erstellungsdatum asc'}" />
                        </button>
                    </li>
                    <!-- Status -->
                    <li>
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.status}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'prozesse.sortHelperStatus asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'prozesse.sortHelperStatus desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'prozesse.sortHelperStatus asc' ? 'prozesse.sortHelperStatus desc' : 'prozesse.sortHelperStatus asc'}" />
                        </button>
                    </li>
                    <!-- Project -->
                    <li>
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.projekt}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'projekte.titel asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'projekte.titel desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'projekte.titel asc' ? 'projekte.titel desc' : 'projekte.titel asc'}" />
                        </button>
                    </li>
                    <!-- Institution -->
                    <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.institution}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'institution.shortName asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'institution.shortName desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'institution.shortName asc' ? 'institution.shortName desc' : 'institution.shortName asc'}" />
                        </button>
                    </li>
                    <!-- Last Status Update -->
                    <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                        <button
                            jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                            class="dropdown-item d-flex justify-content-between">
                            <h:outputText value="#{msgs.lastStatusUpdate}" />
                            <util:icon icon="#{ProzessverwaltungForm.sortField == 'sorthelper_last_close_date asc' ? 'sort-ascending' : ProzessverwaltungForm.sortField == 'sorthelper_last_close_date desc' ? 'sort-descending' : 'arrows-sort'}" />
                            <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.sortField}"
                                value="#{ProzessverwaltungForm.sortField == 'sorthelper_last_close_date asc' ? 'sorthelper_last_close_date desc' : 'sorthelper_last_close_date asc'}" />
                        </button>
                    </li>
                </ul>
            </div>
        </div>

        <button
          class="btn btn-icon gw-table__filters__option"
          jsf:action="#{NavigationForm.Reload}"
          title="#{ProzessverwaltungForm.anzeigeAnpassen['gridview']?msgs.process_displayAsTable:msgs.process_displayAsGrid}"
          pt:aria-label="#{msgs.process_displayAsGrid}"
          jsf:rendered="#{ProzessverwaltungForm.modusAnzeige=='aktuell'}">
          <util:icon icon="#{ProzessverwaltungForm.anzeigeAnpassen['gridview']?'list':'layout-grid'}" />
          <f:setPropertyActionListener
            target="#{ProzessverwaltungForm.anzeigeAnpassen['gridview']}"
            value="#{not ProzessverwaltungForm.anzeigeAnpassen['gridview']}" />
          <f:passThroughAttribute
            name="data-toggle"
            value="tooltip" />
        </button>

        <h:panelGroup rendered="#{ProzessverwaltungForm.modusAnzeige=='vorlagen' or !NavigationForm.uiStatus['processListDisplay']}">
        <div
          class="btn-group"
          data-bs-toggle="tooltip"
          title="#{msgs.selectTableColumns}">
          <!-- show columns -->
          <div id="dropdown" class="dropdown">
            <button
              type="button"
              aria-label="#{msgs.selectTableColumns}"
              id="selectDisplay"
              class="btn btn-icon gw-table__filters__option dropdown-toggle"
              data-bs-toggle="dropdown"
              aria-haspopup="true"
              aria-expanded="false">
              <util:icon icon="layout-columns" />
              <span class="caret"></span>
            </button>

            <ul class="dropdown-menu">
              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- check boxes -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showSelectionBoxes"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['selectionBoxes']?'square-check':'square'}" text="#{msgs.auswahlboxen}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['selectionBoxes']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['selectionBoxes']}" />
                </button>
              </li>
              <li>
                <!-- ID -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showProcessId"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['processId']?'square-check':'square'}" text="#{msgs.id}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['processId']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['processId']}" />
                </button>
              </li>
              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- Thumbnail -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showProcessThumbnail"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['thumbnail']?'square-check':'square'}" text="#{msgs.thumbnail}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['thumbnail']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['thumbnail']}" />
                </button>
              </li>
              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- Metadata details -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showProcessMetadataDetails"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['metadatadetails']?'square-check':'square'}" text="#{msgs.metadatadetails}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['metadatadetails']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['metadatadetails']}" />
                </button>
              </li>
              <li>
                <!-- Regelsatz -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showProcessRuleset"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['processRuleset']?'square-check':'square'}" text="#{msgs.regelsatz}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['processRuleset']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['processRuleset']}" />
                </button>
              </li>
              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- Batch ID -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showBatch"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['batchId']?'square-check':'square'}" text="#{msgs.batch}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['batchId']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['batchId']}" />
                </button>
              </li>
              <li>
                <!-- process date -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showProcessDate"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['processDate']?'square-check':'square'}" text="#{msgs.vorgangsdatum}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['processDate']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['processDate']}" />
                </button>
              </li>
              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- lockings -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showProcessLockings"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['lockings']?'square-check':'square'}" text="#{msgs.sperrungen}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['lockings']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['lockings']}" />
                </button>
              </li>
              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- swapping -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showSwapping"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['swappedOut']?'square-check':'square'}" text="#{msgs.ausgelagerung}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['swappedOut']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['swappedOut']}" />
                </button>
              </li>

              <li jsf:rendered="#{ProzessverwaltungForm.modusAnzeige!='vorlagen'}">
                <!-- show number of images -->
                <button
                  jsf:action="#{NavigationForm.Reload}"
                  jsf:id="showNumberOfImages"
                  class="dropdown-item">
                  <util:icon-text icon="#{ProzessverwaltungForm.anzeigeAnpassen['numberOfImages']?'square-check':'square'}" text="#{msgs.NumberOfImages}" />
                  <f:setPropertyActionListener
                    target="#{ProzessverwaltungForm.anzeigeAnpassen['numberOfImages']}"
                    value="#{not ProzessverwaltungForm.anzeigeAnpassen['numberOfImages']}" />
                </button>
              </li>

            </ul>
          </div>
        </div>
      </h:panelGroup>

            <c:if test="#{LoginForm.hasRole('Workflow_Processes_Show_Deactivated_Projects') or LoginForm.hasRole('Workflow_Processes_Show_Finished')}">
                <div
                  class="btn-group"
                  data-bs-toggle="tooltip"
                  title="#{msgs.anzeigeAnpassen}">
                  <div class="dropdown">
                    <button
                    	id="modifyDisplay"
                      type="button"
                      aria-label="#{msgs.anzeigeAnpassen}"
                      class="btn btn-icon gw-table__filters__option dropdown-toggle"
                      data-bs-toggle="dropdown"
                      aria-haspopup="true"
                      aria-expanded="false"
                      >
                      <util:icon icon="tool" styleClass="margin-right-5" />
                      <span class="caret"></span>
                    </button>

                    <!-- show or hide depending on filter -->
                    <ul class="dropdown-menu">
                        <h:panelGroup rendered="#{LoginForm.hasRole('Workflow_Processes_Show_Finished')}">
                            <li>
                              <!-- correction tasks -->
                              <button
                                jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                                jsf:id="showCorrectionTasks"
                                class="dropdown-item">
                                <util:icon-text icon="#{ProzessverwaltungForm.showClosedProcesses?'square-check':'square'}" text="#{msgs.showClosedProcesses}" />
                                <f:setPropertyActionListener
                                  target="#{ProzessverwaltungForm.showClosedProcesses}"
                                  value="#{not ProzessverwaltungForm.showClosedProcesses}" />
                                </button>
                            </li>
                        </h:panelGroup>
                        <h:panelGroup rendered="#{LoginForm.hasRole('Workflow_Processes_Show_Deactivated_Projects')}">
                            <li>
                            <!-- automatic tasks -->
                            <button
                              jsf:action="#{ProzessverwaltungForm.FilterAlleStart}"
                              jsf:id="showAutomaticTasks"
                              class="dropdown-item">
                              <util:icon-text icon="#{ProzessverwaltungForm.showArchivedProjects?'square-check':'square'}" text="#{msgs.showArchivedProjects}" />
                              <f:setPropertyActionListener
                                target="#{ProzessverwaltungForm.showArchivedProjects}"
                                value="#{not ProzessverwaltungForm.showArchivedProjects}" />
                            </button>
                            </li>
                        </h:panelGroup>
                    </ul>
                </div>
                </div>
            </c:if>
    </composite:implementation>

</ui:composition>
