<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:composite="http://xmlns.jcp.org/jsf/composite"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
	xmlns:util="http://goobi.io/util">

	<composite:interface />

	<composite:implementation>

		<div id="filterTableColumns" class="btn-group" data-bs-toggle="tooltip" title="#{msgs.selectTableColumns}">
			<div class="dropdown">
				<button
					id="columnDropdown"
					type="button"
					aria-label="#{msgs.selectTableColumns}"
					class="btn btn-blank btn-icon dropdown-toggle"
					data-bs-toggle="dropdown"
					aria-haspopup="true"
					aria-expanded="false">
					<util:icon icon="columns" />
				</button>

				<ul class="dropdown-menu">
					<li>
						<button jsf:id="processId" jsf:action="#{NavigationForm.Reload}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.anzeigeAnpassen['processId']?'square-check':'square'}" text="#{msgs.id}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.anzeigeAnpassen['processId']}" value="#{not AktuelleSchritteForm.anzeigeAnpassen['processId']}" />
						</button>
					</li>
					<li>
						<button jsf:id="batchId" jsf:action="#{NavigationForm.Reload}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.anzeigeAnpassen['batchId']?'square-check':'square'}" text="#{msgs.batch}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.anzeigeAnpassen['batchId']}" value="#{not AktuelleSchritteForm.anzeigeAnpassen['batchId']}" />
						</button>
					</li>
					<li>
						<button jsf:id="processDate" jsf:action="#{NavigationForm.Reload}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.anzeigeAnpassen['processDate']?'square-check':'square'}" text="#{msgs.vorgangsdatum}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.anzeigeAnpassen['processDate']}" value="#{not AktuelleSchritteForm.anzeigeAnpassen['processDate']}" />
						</button>
					</li>
					<li>
						<button jsf:id="lockings" jsf:action="#{NavigationForm.Reload}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.anzeigeAnpassen['lockings']?'square-check':'square'}" text="#{msgs.sperrungen}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.anzeigeAnpassen['lockings']}" value="#{not AktuelleSchritteForm.anzeigeAnpassen['lockings']}" />
						</button>
					</li>
					<li>
						<button jsf:id="showNumberOfImages" jsf:action="#{NavigationForm.Reload}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.anzeigeAnpassen['numberOfImages']?'square-check':'square'}" text="#{msgs.NumberOfImages}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.anzeigeAnpassen['numberOfImages']}" value="#{not AktuelleSchritteForm.anzeigeAnpassen['numberOfImages']}" />
						</button>
					</li>
				</ul>
			</div>
		</div>

		<div class="btn-group" data-bs-toggle="tooltip" title="#{msgs.anzeigeAnpassen}">
			<div class="dropdown">
				<button id="anzeigeAnpassenDropdown" type="button" aria-haspopup="true" aria-expanded="false" aria-label="#{msgs.anzeigeAnpassen}" class="btn btn-blank btn-icon dropdown-toggle" data-bs-toggle="dropdown">
					<util:icon icon="tool" />
				</button>

				<ul class="dropdown-menu">
					<li>
						<button jsf:id="showAutomaticTasks" jsf:action="#{AktuelleSchritteForm.FilterAlleStart}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.showAutomaticTasks?'square-check':'square'}" text="#{msgs.showAutomaticTasks}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.showAutomaticTasks}" value="#{not AktuelleSchritteForm.showAutomaticTasks}" />
						</button>
					</li>
					<li>
						<button jsf:id="hideCorrectionTasks" jsf:action="#{AktuelleSchritteForm.FilterAlleStart}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.hideCorrectionTasks?'square-check':'square'}" text="#{msgs.hideCorrectionTasks}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.hideCorrectionTasks}" value="#{not AktuelleSchritteForm.hideCorrectionTasks}" />
						</button>
					</li>
					<li>
						<button jsf:id="onlyOwnSteps" jsf:action="#{AktuelleSchritteForm.FilterAlleStart}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.nurEigeneSchritte?'square-check':'square'}" text="#{msgs.nurEigeneAufgabenAnzeigen}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.nurEigeneSchritte}" value="#{not AktuelleSchritteForm.nurEigeneSchritte}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.nurOffeneSchritte}" value="#{false}" />
						</button>
					</li>
					<li>
						<button jsf:id="onlyOpenSteps" jsf:action="#{AktuelleSchritteForm.FilterAlleStart}" class="dropdown-item">
							<util:icon-text icon="#{AktuelleSchritteForm.nurOffeneSchritte?'square-check':'square'}" text="#{msgs.nurOffeneAufgabenAnzeigen}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.nurOffeneSchritte}" value="#{not AktuelleSchritteForm.nurOffeneSchritte}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.nurEigeneSchritte}" value="#{false}" />
						</button>
					</li>
					<li>
						<button jsf:id="hideStepsFromOtherUsers" jsf:action="#{AktuelleSchritteForm.FilterAlleStart}" class="dropdown-item">
							<util:icon-text icon="#{not AktuelleSchritteForm.hideStepsFromOtherUsers?'square-check':'square'}" text="#{msgs.showTasksFromOtherUsers}" />
							<f:setPropertyActionListener target="#{AktuelleSchritteForm.hideStepsFromOtherUsers}" value="#{not AktuelleSchritteForm.hideStepsFromOtherUsers}" />
						</button>
					</li>
				</ul>
			</div>
		</div>

	</composite:implementation>
</ui:composition>
