<ui:composition
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:composite="http://xmlns.jcp.org/jsf/composite"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:intranda="http://xmlns.jcp.org/jsf/composite/composites"
	xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
	xmlns:p="http://primefaces.org/ui"
	xmlns:jsf="http://xmlns.jcp.org/jsf"
	xmlns:util="http://goobi.io/util">

	<composite:interface />

	<composite:implementation>

		<p>Depending on your account, this sample might not be visible.</p>

		<util:missing-rights rights="this_right_does_not_exist"></util:missing-rights>

        <div class="accordion-item mt-3">
			<h2 class="accordion-header">
				<button
					data-bs-target="#codeGeneral"
					class="accordion-button btn btn-primary-400 collapsed"
					type="button"
					data-bs-toggle="collapse"
					aria-expanded="false"
					aria-controls="collapseOne">Code Snippet</button>
			</h2>
			<div
				id="codeGeneral"
				class="accordion-collapse collapse"
				data-bs-parent="#accordionExample">
				<div class="accordion-body">

					<pre
						class="code--form-actions bg-neutral-500 text-white px-4"
						style="border-radius: var(- -border-radius)">
						<code class="microlight">
&lt;util:missing-rights rights=&quot;this_right_does_not_exist&quot;&gt;&lt;/util:missing-rights&gt;
                        </code>
                    </pre>
                </div>
            </div>
            </div>
    </composite:implementation>
</ui:composition>
