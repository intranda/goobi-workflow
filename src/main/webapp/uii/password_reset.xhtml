<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:jsf="http://xmlns.jcp.org/jsf"
    template="/uii/template/template_minimum.html">

    <f:metadata>
        <f:viewParam name="token" value="#{passwordResetBean.token}" />
        <f:event type="preRenderView" listener="#{passwordResetBean.init}" />
    </f:metadata>

    <ui:param name="myPageTitle" value="#{msgs.pwReset_page_title}" />

    <ui:define name="content">
        <div id="main" class="login-body container">

            <h:messages
                escape="false"
                globalOnly="false"
                errorClass="alert alert-danger"
                infoClass="alert alert-info"
                showDetail="true"
                showSummary="true"
                styleClass="messagesLogin" />

            <!-- Token invalid / expired -->
            <h:panelGroup
                rendered="#{!passwordResetBean.tokenValid and !passwordResetBean.passwordSaved}">
                <div class="alert alert-danger">
                    <h:outputText value="#{msgs.pwReset_tokenInvalid}" />
                </div>
                <h:link outcome="/uii/external_index" styleClass="btn btn-primary-400 mt-3">
                    <h:outputText value="#{msgs.pwReset_backToLogin}" />
                </h:link>
            </h:panelGroup>

            <!-- New password form -->
            <h:panelGroup
                rendered="#{passwordResetBean.tokenValid and !passwordResetBean.passwordSaved}">
                <h1 class="page__heading m-0 mb-3">
                    <h:outputText value="#{msgs.pwReset_page_title}" />
                </h1>
                <h:form id="pwResetForm">
                    <div class="form form--full-width">
                        <label for="newPassword">
                            <h:outputText value="#{msgs.pwReset_newPassword}" />
                        </label>
                        <h:inputSecret
                            id="newPassword"
                            styleClass="form-control"
                            value="#{passwordResetBean.newPassword}"
                            required="false">
                            <f:passThroughAttribute name="placeholder" value="" />
                        </h:inputSecret>
                    </div>
                    <div class="form form--full-width">
                        <label for="confirmPassword">
                            <h:outputText value="#{msgs.pwReset_confirmPassword}" />
                        </label>
                        <h:inputSecret
                            id="confirmPassword"
                            styleClass="form-control"
                            value="#{passwordResetBean.confirmPassword}"
                            required="false">
                            <f:passThroughAttribute name="placeholder" value="" />
                        </h:inputSecret>
                    </div>
                    <div class="form-actions mt-3">
                        <button
                            jsf:id="submit"
                            jsf:action="#{passwordResetBean.saveNewPassword}"
                            class="btn btn-primary-400">
                            <h:outputText value="#{msgs.pwReset_submit}" />
                        </button>
                    </div>
                </h:form>
            </h:panelGroup>

            <!-- Success -->
            <h:panelGroup rendered="#{passwordResetBean.passwordSaved}">
                <div class="alert alert-success">
                    <h:outputText value="#{msgs.pwReset_success}" />
                </div>
                <h:link outcome="/uii/external_index" styleClass="btn btn-primary-400 mt-3">
                    <h:outputText value="#{msgs.pwReset_backToLogin}" />
                </h:link>
            </h:panelGroup>

        </div>
    </ui:define>

</ui:composition>
