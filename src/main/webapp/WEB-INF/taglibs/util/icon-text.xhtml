<ui:component
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:util="http://goobi.io/util"
>
    <span class="#{styleClass} icon-text">
        <ui:fragment rendered="#{iconPosition != 'right'}">
            <util:icon icon="#{icon}" styleClass="#{iconClass}" />
        </ui:fragment>
        <span class="#{textClass}">#{text}</span>
        <ui:fragment rendered="#{iconPosition == 'right'}">
            <util:icon icon="#{icon}" styleClass="#{iconClass}" />
        </ui:fragment>
    </span>
</ui:component>
