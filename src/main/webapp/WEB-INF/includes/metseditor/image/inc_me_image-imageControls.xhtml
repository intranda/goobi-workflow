<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:composite="http://xmlns.jcp.org/jsf/composite"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pt="http://xmlns.jcp.org/jsf/passthrough"
    xmlns:util="http://goobi.io/util">

    <composite:interface />

    <!-- TODO: fix image controls -->

    <composite:implementation>
        <div class="position-absolute bottom-0 d-flex justify-content-center w-100">
            <ul
                id="meImageControls"
                class="image__controls border rounded mb-1 p-1 d-flex flex-nowrap gap-1 align-items-center bg-white above-overlay"
                role="list">
                <!-- ROTATE LEFT -->
                <li>
                    <button
                        id="rotate-left-x"
                        aria-label="#{msgs.mets_rotateImageLeft}"
                        type="button"
                        class="btn btn-blank"
                        title="#{msgs.mets_rotateImageLeft}"
                        data-toggle="tooltip"
                        data-placement="top">
                        <util:icon
                            icon="rotate"
                            styleClass="icon--lg" />
                    </button>
                </li>
                <!-- ROTATE RIGHT -->
                <li>
                    <button
                        type="button"
                        class="btn btn-blank"
                        id="rotate-right-x"
                        aria-label="#{msgs.mets_rotateImageRight}"
                        title="#{msgs.mets_rotateImageRight}"
                        data-toggle="tooltip"
                        data-placement="top">
                        <util:icon
                            icon="rotate-clockwise"
                            styleClass="icon--lg" />
                    </button>
                </li>

                <!-- RESET -->
                <li>
                    <button
                        id="reset-position"
                        type="button"
                        class="btn btn-blank"
                        aria-label="#{msgs.mets_resetImageRotation}"
                        title="#{msgs.mets_resetImageRotation}"
                        data-toggle="tooltip"
                        data-placement="top">
                        <util:icon
                            icon="circle-x"
                            styleClass="icon--lg" />
                    </button>
                </li>
                <li class="image__controls-zoom">
                    <div
                        id="zoomSliderLabel"
                        class="image__controls-zoom-label">
                        <div class=" input-group">
                            <input
                                aria-label="#{msgs.sizeOfImages}"
                                type="text"
                                class="form-control" />
                            <div class="input-group-text">
                                <span>%</span>
                            </div>
                        </div>
                    </div>
                </li>
                <li>
                    <button
                        type="button"
                        class="btn btn-icon btn-blank"
                        data-bs-toggle="dropdown"
                        data-bs-auto-close="outside"
                        data-bs-reference="parent"
                        aria-expanded="false"
                        title="#{msgs.label__image_filter_toolkit}"
                        data-toggle="tooltip"
                        data-placement="top"
                        aria-label="#{msgs.label__image_filter_toolkit}">
                        <util:icon
                            icon="chevron-up"
                            styleClass="icon--lg" />
                    </button>
                    <div class="dropdown-menu dropdown-menu-end">
                        <ui:include src="inc_me_image-imageFilters.xhtml" />
                    </div>
                </li>
                <li>
                    <a
                        target="_blank"
                        href="#{Metadaten.image.maxUrl}"
                        class="btn btn-icon btn-blank"
                        title="#{msgs.displayImage}"
                        aria-label="#{msgs.displayImage}">
                        <util:icon
                            icon="photo"
                            styleClass="icon--lg" />
                    </a>
                </li>


            </ul>
        </div>
    </composite:implementation>
</ui:composition>
